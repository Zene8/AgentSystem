# Common Copilot Skills

skills:
  - id: "fix-lint"
    description: "Fix linting errors in current PR"
    command: "npm run format && npm run lint"
    trigger: ["@copilot fix lint", "/fix-lint"]

  - id: "run-tests"
    description: "Run test suite and report coverage"
    command: "npm test -- --coverage"
    trigger: ["@copilot run tests", "/tests"]

  - id: "update-docs"
    description: "Update README or contributing docs"
    files: ["README.md", "CONTRIBUTING.md", "docs/**"]
    trigger: ["@copilot update docs"]

  - id: "create-test"
    description: "Generate test file for missing coverage"
    context: "@src/file.js"  # User provides with @ syntax
    trigger: ["@copilot test this"]
