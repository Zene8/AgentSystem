name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Node.js tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # node --test globs its args (Node >=22). Quoted so node expands, not bash.
      - name: Run all tests
        run: node --test "tests/test_*.js" "tools/*.test.js" "tools/graph/*.test.js" "hooks/*.test.js"
