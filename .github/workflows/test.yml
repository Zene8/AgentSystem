name: Tests

on:
  push:
    branches: [main, dev, 'feat/**']
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Node.js tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: ['22']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run graph tests
        run: node --test tests/test_graph.js

      - name: Run memory-lookup tests
        run: node --test tests/test_memory_lookup.js

      - name: Run decision-log tests
        run: node --test tests/test_decision_log.js

      - name: Run known-repos tests
        run: node --test tests/test_known_repos.js

      - name: Run memory-search tests
        run: node --test tests/test_memory_search.js

      - name: Run session-namer tests
        run: node --test tests/test_session_namer.js

      - name: Run task-scratchpad tests
        run: node --test tests/test_task_scratchpad.js
