name: Sentry Error Bridge

on:
  repository_dispatch:
    types: [sentry_error]

jobs:
  bridge:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write payload to file
        shell: pwsh
        run: |
          '${{ toJson(github.event.client_payload) }}' | Out-File -FilePath '${{ runner.temp }}\sentry-payload.json' -Encoding utf8

      - name: Run Sentry bridge
        shell: pwsh
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node C:\Users\natha\AgentSystem\tools\integrations\sentry-bridge.js --payload='${{ runner.temp }}\sentry-payload.json'
