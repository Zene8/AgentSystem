name: Friday Engineering Audit

# #164: Friday's audit is informational-only and runs once per PR, on open, not on every push
# (pr-auto-review / cavecrew-reviewer is retired — this is now the single engineering reviewer).
on:
  pull_request:
    types: [opened]
    branches: [main, dev]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

# New push to branch cancels in-flight audit — re-runs fresh
concurrency:
  group: friday-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  friday-audit:
    name: Engineering Audit (Friday CTO)
    # Linux self-hosted runner, co-located with Mission Control. Requires BOTH labels
    # so only the Linux runner picks this up.
    runs-on: [self-hosted, Linux]
    permissions:
      pull-requests: write
      contents: read
    # Skip PRs labeled `spec` (design/spec discussion, not mergeable code).
    if: >-
      !contains(github.event.pull_request.labels.*.name, 'spec')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve gh/claude absolute paths for runner service context
        id: tools
        shell: bash
        # The self-hosted runner runs as a systemd service whose PATH may not include
        # ~/.local/bin (where claude usually lives). Resolve absolute paths once.
        run: |
          resolve() {
            local name="$1"; shift
            local c
            for c in "$@"; do [ -x "$c" ] && { echo "$c"; return; }; done
            command -v "$name" 2>/dev/null || true
          }
          GH_PATH=$(resolve gh "$HOME/.local/bin/gh" /usr/local/bin/gh /usr/bin/gh)
          CLAUDE_PATH=$(resolve claude "$HOME/.local/bin/claude" /usr/local/bin/claude /usr/bin/claude)
          echo "Resolved gh: $GH_PATH"
          echo "Resolved claude: $CLAUDE_PATH"
          echo "gh_path=$GH_PATH" >> "$GITHUB_OUTPUT"
          echo "claude_path=$CLAUDE_PATH" >> "$GITHUB_OUTPUT"

      - name: Get PR diff
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          GH="${{ steps.tools.outputs.gh_path }}"
          echo "Using gh: $GH"
          "$GH" --version || true
          if ! "$GH" pr diff "${{ github.event.pull_request.number }}" > "$RUNNER_TEMP/pr-diff-full.txt"; then
            echo "gh pr diff failed"
            exit 1
          fi
          # #175: 4000-line cap (was 400, which dropped later files) + explicit marker.
          total=$(wc -l < "$RUNNER_TEMP/pr-diff-full.txt")
          head -n 4000 "$RUNNER_TEMP/pr-diff-full.txt" > "$RUNNER_TEMP/pr-diff.txt"
          if [ "$total" -gt 4000 ]; then
            {
              echo ""
              echo "[DIFF TRUNCATED at 4000 of $total lines - files after this point are"
              echo "still part of this PR; do not treat them as absent.]"
            } >> "$RUNNER_TEMP/pr-diff.txt"
          fi

      - name: Run Friday engineering audit
        id: audit
        shell: bash
        # Untrusted PR title/branch values come in via env: (below), never interpolated
        # into the script text (injection mitigation — see sam-audit.yml).
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -o pipefail
          CLAUDE="${{ steps.tools.outputs.claude_path }}"
          TASK="$RUNNER_TEMP/friday-task.txt"
          RESULT="$RUNNER_TEMP/friday-result.txt"
          {
            echo 'You are Friday (CTO). Run your engineering-quality audit on this pull request.'
            echo ''
            printf 'PR #%s: %s\n' "$PR_NUMBER" "$PR_TITLE"
            printf 'Base branch: %s\n' "$BASE_REF"
            printf 'Head branch: %s\n' "$HEAD_REF"
            echo ''
            echo '## Your 8-item Engineering Audit Checklist'
            echo '1. Code correctness — no obvious bugs or logic errors'
            echo '2. Test coverage — critical paths have tests'
            echo '3. Standards compliance — follows repo style (CLAUDE.md path-scoped rules)'
            echo '4. No dead code — all changes serve the two purposes (#162)'
            echo '5. Architecture fit — aligns with system design'
            echo '6. Performance — no degradation in hot paths'
            echo '7. Refactoring candidates — any duplication or complexity to simplify'
            echo '8. Documentation — changes are documented where needed'
            echo ''
            echo '## Diff'
            cat "$RUNNER_TEMP/pr-diff.txt"
            echo ''
            echo '## Required Output Format'
            echo 'Your FIRST LINE must be exactly one of (this is a machine-parsed marker — do not'
            echo 'compress, reword, or drop it):'
            echo '  REVIEWED: <one-line summary of what was audited>'
            echo '  CONCERNS: <one-line statement of what needs discussion before merge>'
            echo ''
            echo 'Then list each checklist item result: PASS / NOTE / SKIP with a brief comment.'
            echo 'If CONCERNS, describe each specific concern (architectural, correctness, or standards).'
            echo 'This is informational — never blocks merge (Sam is the merge gate).'
            echo ''
            echo '## Response Style (#164 token diet)'
            echo 'Write the checklist and notes in caveman-compressed style: drop articles/filler'
            echo 'words, fragments are fine, no preamble or sign-off. Keep full technical substance --'
            echo 'every finding, file/line reference, and suggested fix must still be complete and'
            echo 'precise. Do NOT compress the REVIEWED:/CONCERNS: marker line itself or any code'
            echo 'finding text -- write those in normal, unambiguous language so nothing is lost or'
            echo 'misread.'
          } > "$TASK"
          echo "friday-task.txt length: $(wc -c < "$TASK")"
          # Agent names are case-sensitive (registered as `Friday`). Prompt piped via stdin.
          "$CLAUDE" --agent Friday --model sonnet --effort medium -p < "$TASK" > "$RESULT" 2>&1 || true
          echo "claude done; result bytes: $(wc -c < "$RESULT")"
          if grep -q '^REVIEWED:' "$RESULT"; then
            echo "status=reviewed" >> "$GITHUB_OUTPUT"
          else
            echo "status=concerns" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Post Friday review to PR
        uses: actions/github-script@v7
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const status = '${{ steps.audit.outputs.status }}';
            let result = '';
            try {
              result = fs.readFileSync(process.env.RUNNER_TEMP + '/friday-result.txt', 'utf8');
            } catch (e) {
              result = 'Error reading Friday audit output: ' + e.message;
            }
            if (result.length > 60000) result = result.slice(0, 60000) + '\n\n...(truncated)';

            const emoji = status === 'reviewed' ? '✅' : '⚠️';
            // Use COMMENT for both reviewed and concerns cases — this is informational, never blocks
            const event = 'COMMENT';

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ github.event.pull_request.number }},
              body: `${emoji} **Friday (CTO) — Engineering Audit**\n\n${result}`,
              event: event,
            });
