name: Sam Security Audit

# #164: Sam runs exactly ONCE per PR at merge-prep time, not once per push.
# - `opened` (non-draft only, see job `if:` below): a normal PR opened directly (not as a draft)
#   is ready immediately — without this, a non-draft PR that never gets the ready-to-merge label
#   or a draft->ready transition would merge un-audited.
# - `ready_for_review`: covers the draft->ready transition.
# - `labeled` (gated to `ready-to-merge` in the job `if:` below): lets a human re-request the
#   audit at merge time on a PR that's already open (e.g. after addressing feedback).
# `synchronize` is intentionally NOT a trigger — that was the old per-push behavior this replaces.
# #147: NO paths-ignore here. This job is a required status check on main — a workflow-level
# paths-ignore means docs-only PRs never produce the check at all, which makes them permanently
# unmergeable once branch protection requires it. Docs-only and spec PRs instead early-exit
# APPROVED inside the job (see the "Docs-only / spec precheck" step), so the required check
# still reports success without spending an audit run.
on:
  pull_request:
    types: [opened, ready_for_review, labeled]
    branches: [main, dev]

# New push to branch cancels in-flight audit — re-runs fresh
concurrency:
  group: sam-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sam-audit:
    name: Security Audit (Sam CSO)
    # Linux self-hosted runner, co-located with Mission Control (installed via
    # tools/mission-control/install-runner.sh). Requires BOTH labels so only the
    # Linux runner picks this up — never a stray Windows runner.
    runs-on: [self-hosted, Linux]
    permissions:
      pull-requests: write
      contents: read
    # De-dupe: exactly one audit per PR at merge-prep time (see trigger comment above).
    # `spec`-labeled PRs are NOT skipped at the job level anymore (#147) — a job-level skip
    # produces no check run, which blocks merge once this check is required. They early-exit
    # APPROVED in the precheck step below instead.
    if: >-
      (github.event.action == 'opened' && github.event.pull_request.draft == false) ||
      github.event.action == 'ready_for_review' ||
      (github.event.action == 'labeled' && github.event.label.name == 'ready-to-merge')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # #147: replaces workflow-level paths-ignore and job-level spec skip. Docs-only and
      # spec-labeled PRs get an APPROVED check without running the (expensive) Claude audit,
      # keeping the required status check green for them.
      - name: Docs-only / spec precheck
        id: precheck
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            if (labels.includes('spec')) {
              core.setOutput('skip', 'true');
              core.setOutput('skip_reason', 'spec-labeled PR (design/spec discussion, not mergeable code audit)');
              return;
            }
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const docsOnly = files.length > 0 && files.every(f =>
              f.filename.startsWith('docs/') || f.filename.endsWith('.md'));
            core.setOutput('skip', docsOnly ? 'true' : 'false');
            if (docsOnly) core.setOutput('skip_reason', 'docs-only change (docs/** and *.md files only)');

      - name: Pass check without audit (docs-only / spec)
        if: steps.precheck.outputs.skip == 'true'
        run: |
          echo "APPROVED without Claude audit: ${{ steps.precheck.outputs.skip_reason }}"

      - name: Resolve gh/claude absolute paths for runner service context
        if: steps.precheck.outputs.skip != 'true'
        id: tools
        shell: bash
        # The self-hosted runner runs as a systemd service whose PATH does not
        # necessarily include ~/.local/bin (where the claude CLI usually lives).
        # Resolve absolute paths once and invoke by full path in later steps rather
        # than depending on the service PATH.
        run: |
          resolve() {
            local name="$1"; shift
            local c
            for c in "$@"; do [ -x "$c" ] && { echo "$c"; return; }; done
            command -v "$name" 2>/dev/null || true
          }
          GH_PATH=$(resolve gh "$HOME/.local/bin/gh" /usr/local/bin/gh /usr/bin/gh)
          CLAUDE_PATH=$(resolve claude "$HOME/.local/bin/claude" /usr/local/bin/claude /usr/bin/claude)
          echo "Resolved gh: $GH_PATH"
          echo "Resolved claude: $CLAUDE_PATH"
          echo "gh_path=$GH_PATH" >> "$GITHUB_OUTPUT"
          echo "claude_path=$CLAUDE_PATH" >> "$GITHUB_OUTPUT"

      - name: Get PR diff
        if: steps.precheck.outputs.skip != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          GH="${{ steps.tools.outputs.gh_path }}"
          echo "Using gh: $GH"
          "$GH" --version || true
          if ! "$GH" pr diff "${{ github.event.pull_request.number }}" > "$RUNNER_TEMP/pr-diff-full.txt"; then
            echo "gh pr diff failed"
            exit 1
          fi
          # #175: cap the diff at 4000 lines (was 400 — which silently dropped later
          # files and made Sam report them as "absent from the PR"). Mark truncation
          # explicitly so the auditor doesn't treat missing files as not-in-the-PR.
          total=$(wc -l < "$RUNNER_TEMP/pr-diff-full.txt")
          head -n 4000 "$RUNNER_TEMP/pr-diff-full.txt" > "$RUNNER_TEMP/pr-diff.txt"
          if [ "$total" -gt 4000 ]; then
            {
              echo ""
              echo "[DIFF TRUNCATED at 4000 of $total lines - files after this point are"
              echo "still part of this PR; do not treat them as absent.]"
            } >> "$RUNNER_TEMP/pr-diff.txt"
          fi

      - name: Run Sam security audit
        if: steps.precheck.outputs.skip != 'true'
        id: audit
        shell: bash
        # Untrusted PR title/branch values come in via env: (below), NEVER interpolated
        # into the script text — GitHub Actions expression substitution happens before the
        # shell sees the script, so a title with quotes/backticks/$(...) could otherwise
        # break or inject. Read them from $VAR in double quotes; the shell does not
        # re-evaluate variable *contents*.
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -o pipefail
          CLAUDE="${{ steps.tools.outputs.claude_path }}"
          TASK="$RUNNER_TEMP/sam-task.txt"
          RESULT="$RUNNER_TEMP/sam-result.txt"
          {
            echo 'You are Sam (CSO). Run your pre-merge security audit on this pull request.'
            echo ''
            printf 'PR #%s: %s\n' "$PR_NUMBER" "$PR_TITLE"
            printf 'Base branch: %s\n' "$BASE_REF"
            printf 'Head branch: %s\n' "$HEAD_REF"
            echo ''
            echo '## Your 10-item Audit Checklist'
            echo '1. Data access patterns reviewed'
            echo '2. Auth/authz logic correct'
            echo '3. Credential handling secure (no secrets in diff)'
            echo '4. PHI exposure assessment'
            echo '5. Compliance with applicable standards'
            echo '6. Audit trail logging present'
            echo '7. Input validation at system boundaries'
            echo "8. Error messages don't leak sensitive data"
            echo '9. No secrets, API keys, or credentials in code/config'
            echo '10. Vendor contracts reviewed if new vendor with PHI'
            echo ''
            echo '## Diff'
            cat "$RUNNER_TEMP/pr-diff.txt"
            echo ''
            echo '## Required Output Format'
            echo 'Your FIRST LINE must be exactly one of (this is a machine-parsed marker — do not'
            echo 'compress, reword, or drop it):'
            echo '  APPROVED: <one-line summary of what was audited>'
            echo '  BLOCKED: <one-line reason for blocking>'
            echo ''
            echo 'Then list each checklist item result: PASS / FAIL / N/A with a brief note.'
            echo 'If BLOCKED, list each specific issue that must be resolved before merge.'
            echo ''
            echo '## Response Style (#164 token diet)'
            echo 'Write the checklist and notes in caveman-compressed style: drop articles/filler'
            echo 'words, fragments are fine, no preamble or sign-off. Keep full technical substance --'
            echo 'every security finding, file/line reference, and required fix must still be'
            echo 'complete and precise. Do NOT compress the APPROVED:/BLOCKED: marker line itself or'
            echo 'any code/security finding text -- write those in normal, unambiguous language so'
            echo 'nothing is lost or misread.'
          } > "$TASK"
          echo "sam-task.txt length: $(wc -c < "$TASK")"
          # --agent Sam: run the real Sam agent definition (.agents/agents/sam.md), whose
          # "CI Pre-Merge Audit Mode" emits the APPROVED:/BLOCKED: vocabulary parsed below.
          # Agent names are case-sensitive (registered as `Sam`). Prompt is piped via stdin
          # (`-p` with no positional arg) to avoid argv length/quoting limits with a large diff.
          "$CLAUDE" --agent Sam --model sonnet --effort medium -p < "$TASK" > "$RESULT" 2>&1 || true
          echo "claude done; result bytes: $(wc -c < "$RESULT")"
          if grep -q '^APPROVED:' "$RESULT"; then
            echo "status=approved" >> "$GITHUB_OUTPUT"
          else
            echo "status=blocked" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Post Sam review to PR
        if: steps.precheck.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const status = '${{ steps.audit.outputs.status }}';
            let result = '';
            try {
              result = fs.readFileSync(process.env.RUNNER_TEMP + '/sam-result.txt', 'utf8');
            } catch (e) {
              result = 'Error reading Sam audit output: ' + e.message;
            }
            if (result.length > 60000) result = result.slice(0, 60000) + '\n\n...(truncated)';

            const emoji = status === 'approved' ? '✅' : '🚫';
            // GitHub hard-blocks the built-in GITHUB_TOKEN from submitting an APPROVE review
            // ("GitHub Actions is not permitted to approve pull requests") — this is a platform
            // restriction to stop workflows from rubber-stamping their own PRs, not a permissions
            // scope we can grant our way around. Use COMMENT for the approved case instead;
            // REQUEST_CHANGES (used for blocked) is not restricted. The PR body text still says
            // APPROVED/BLOCKED and the "ready to merge" comment step below still fires — human
            // merge approval (the actual gate) is unaffected.
            const event = status === 'approved' ? 'COMMENT' : 'REQUEST_CHANGES';

            // Submit as a formal GitHub review — branch protection can require it
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ github.event.pull_request.number }},
              body: `${emoji} **Sam (CSO) — Automated Security Audit**\n\n${result}`,
              event: event,
            });

      - name: Post merge-ready ping (approved only)
        if: steps.audit.outputs.status == 'approved'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number }},
              body: `✅ Sam approved. Tests passing. **Ready to merge** — reply \`/merge\` to proceed or \`/close\` to abandon.`
            });

      - name: Fail check if blocked
        if: steps.audit.outputs.status == 'blocked'
        run: |
          echo "Sam blocked this PR. See review for details."
          exit 1
