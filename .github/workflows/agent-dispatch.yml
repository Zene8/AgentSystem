name: Agent Dispatch

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [ready_for_review]

# Only one agent dispatch per issue/PR at a time
concurrency:
  group: agent-dispatch-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: self-hosted
    # Trigger on:
    #   agent:* label on issue
    #   /agent <name> comment (issue or PR) from repo owner
    #   /merge comment on PR from repo owner → Friday merges
    #   /close comment on PR from repo owner → Friday closes
    if: |
      (github.event_name == 'issues' &&
       startsWith(github.event.label.name, 'agent:')) ||
      (github.event_name == 'issue_comment' &&
       github.event.comment.user.login == github.repository_owner &&
       (startsWith(github.event.comment.body, '/agent ') ||
        github.event.comment.body == '/merge' ||
        github.event.comment.body == '/close'))

    steps:
      - name: Parse command + task
        id: parse
        shell: pwsh
        run: |
          $eventName = "${{ github.event_name }}"
          $body = @"
          ${{ github.event.comment.body }}
          "@
          $body = $body.Trim()

          if ($eventName -eq "issues") {
            # Label dispatch
            $agent = "${{ github.event.label.name }}" -replace "^agent:", ""
            $task  = @"
          ${{ github.event.issue.body }}
          "@
            "agent=$agent" >> $env:GITHUB_OUTPUT
            "command=agent" >> $env:GITHUB_OUTPUT

          } elseif ($body -eq "/merge") {
            # Merge command on PR
            "agent=friday" >> $env:GITHUB_OUTPUT
            "command=merge" >> $env:GITHUB_OUTPUT
            $prNumber = "${{ github.event.issue.number }}"
            $task = "Be Friday (CTO). Merge PR #$prNumber with squash and delete branch. Run: gh pr merge $prNumber --squash --delete-branch"
            $task | Out-File -FilePath "$env:RUNNER_TEMP\task.txt" -Encoding utf8

          } elseif ($body -eq "/close") {
            # Close command on PR
            "agent=friday" >> $env:GITHUB_OUTPUT
            "command=close" >> $env:GITHUB_OUTPUT
            $prNumber = "${{ github.event.issue.number }}"
            $task = "Be Friday (CTO). Close PR #$prNumber without merging. Run: gh pr close $prNumber"
            $task | Out-File -FilePath "$env:RUNNER_TEMP\task.txt" -Encoding utf8

          } else {
            # /agent <name> <task>
            $parts = $body -split '\s+', 3
            $agent = $parts[1]
            $task  = if ($parts.Count -gt 2) { $parts[2] } else { "${{ github.event.issue.body }}" }
            "agent=$agent" >> $env:GITHUB_OUTPUT
            "command=agent" >> $env:GITHUB_OUTPUT
            $task | Out-File -FilePath "$env:RUNNER_TEMP\task.txt" -Encoding utf8
          }

          if (-not (Test-Path "$env:RUNNER_TEMP\task.txt")) {
            # Fallback write for label dispatch
            @"
          ${{ github.event.issue.body }}
          "@ | Out-File -FilePath "$env:RUNNER_TEMP\task.txt" -Encoding utf8
          }

      - name: Post "running" acknowledgement
        uses: actions/github-script@v7
        with:
          script: |
            const cmd = '${{ steps.parse.outputs.command }}';
            const agent = '${{ steps.parse.outputs.agent }}';
            const msg = cmd === 'merge'
              ? `🔀 **Merging PR...** (Friday dispatched ${new Date().toISOString()})`
              : cmd === 'close'
              ? `🚫 **Closing PR...** (Friday dispatched ${new Date().toISOString()})`
              : `⚙️ **Agent \`${agent}\` is running...** (started ${new Date().toISOString()})`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: msg
            });

      - name: Gate /merge on pr-guard (hard security gate — #112)
        id: guard
        if: steps.parse.outputs.command == 'merge'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $prNumber = "${{ github.event.issue.number }}"
          node tools/pr-guard.js $prNumber
          $guardExit = $LASTEXITCODE
          "guard_exit=$guardExit" >> $env:GITHUB_OUTPUT
          if ($guardExit -ne 0) {
            Write-Host "pr-guard blocked merge of PR #$prNumber (exit $guardExit)"
          }
        continue-on-error: true

      - name: Post blocked-merge comment (pr-guard failed)
        if: steps.parse.outputs.command == 'merge' && steps.guard.outputs.guard_exit != '0'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🚫 **Merge blocked.** `pr-guard.js` reports this PR is not ready — CI must be green, no blocking review threads, and an explicit Sam (CSO) APPROVED security-audit review is required before merge. This is a hard, non-bypassable gate (see issue #112). Re-run `/merge` once Sam approves and CI is green.'
            });

      - name: Run agent (claude)
        id: run_claude
        shell: pwsh
        if: steps.parse.outputs.agent != '' && (steps.parse.outputs.command != 'merge' || steps.guard.outputs.guard_exit == '0')
        run: |
          $task = Get-Content "$env:RUNNER_TEMP\task.txt" -Raw

          # Classify task complexity → select model
          $taskLen = $task.Length
          $complexKeywords = @('architecture','security','design','cross-cutting','migration','refactor','multi-file','system','infrastructure')
          $isComplex = ($taskLen -gt 500) -or ($complexKeywords | Where-Object { $task -match $_ } | Measure-Object).Count -gt 0
          $isSimple  = ($taskLen -lt 200) -and -not ($task -match 'file|function|class|module|import')

          $model = if ($isComplex) { 'claude-opus-4-8' }
                   elseif ($isSimple) { 'claude-haiku-4-5-20251001' }
                   else { 'claude-sonnet-5' }

          "model=$model" >> $env:GITHUB_OUTPUT
          $result = claude -p $task --model $model 2>&1
          $result | Out-File -FilePath "$env:RUNNER_TEMP\result.txt" -Encoding utf8
          echo "exit_code=$LASTEXITCODE" >> $env:GITHUB_OUTPUT
        continue-on-error: true

      - name: Parse agent output protocol (DONE:/BLOCKED:/NEEDS_INPUT:)
        id: protocol
        if: steps.run_claude.outputs.exit_code != ''
        shell: pwsh
        run: |
          # Every agent's first output line is required to be DONE:/BLOCKED:/NEEDS_INPUT:
          # (see .agents/agents/*.md "Output Protocol"). Previously nothing consumed this —
          # the workflow only checked $LASTEXITCODE. This step makes the protocol load-bearing:
          # it drives an issue label so the prefix is visible/actionable outside the raw log (#115).
          $result = ''
          try { $result = Get-Content "$env:RUNNER_TEMP\result.txt" -Raw } catch {}
          $firstLine = ($result -split "`n" | Where-Object { $_.Trim() -ne '' } | Select-Object -First 1)
          $prefix = 'unknown'
          if ($firstLine -match '^\s*DONE:')        { $prefix = 'done' }
          elseif ($firstLine -match '^\s*BLOCKED:')    { $prefix = 'blocked' }
          elseif ($firstLine -match '^\s*NEEDS_INPUT:') { $prefix = 'needs-input' }
          "prefix=$prefix" >> $env:GITHUB_OUTPUT
          "first_line=$firstLine" >> $env:GITHUB_OUTPUT

      - name: Apply agent status label
        if: steps.protocol.outputs.prefix != '' && steps.protocol.outputs.prefix != 'unknown'
        uses: actions/github-script@v7
        with:
          script: |
            const prefix = '${{ steps.protocol.outputs.prefix }}';
            const label = `agent:${prefix}`;
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [label]
              });
            } catch (e) {
              // Label may not exist yet in repo label set — ignore, comment still carries the status.
            }

      - name: Post result
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const agent = '${{ steps.parse.outputs.agent }}';
            const cmd = '${{ steps.parse.outputs.command }}';
            let result = '';
            try {
              result = fs.readFileSync(process.env.RUNNER_TEMP + '/result.txt', 'utf8');
            } catch (e) {
              result = `Error reading result: ${e.message}`;
            }
            if (result.length > 60000) {
              result = result.slice(0, 60000) + '\n\n... (truncated)';
            }
            const exitCode = '${{ steps.run_claude.outputs.exit_code }}';
            const protoPrefix = '${{ steps.protocol.outputs.prefix }}';
            const status = exitCode === '0' ? '✅' : '⚠️';
            const label = cmd === 'merge' ? 'Merge' : cmd === 'close' ? 'Close' : `Agent \`${agent}\``;
            const protoHeader = protoPrefix && protoPrefix !== 'unknown' ? ` [\`${protoPrefix}\`]` : '';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${status} **${label} result:**${protoHeader}\n\n\`\`\`\n${result}\n\`\`\``
            });

      - name: Write run log
        if: always()
        shell: pwsh
        run: |
          $logDir = Join-Path $env:USERPROFILE "agent-memory\nexus\run-log"
          New-Item -ItemType Directory -Force -Path $logDir | Out-Null
          $date = Get-Date -Format "yyyy-MM-dd"
          $issueNum = "${{ github.event.issue.number }}"
          $logFile = Join-Path $logDir "$date-issue-$issueNum.json"
          $result = ''
          try { $result = Get-Content "$env:RUNNER_TEMP\result.txt" -Raw } catch {}
          if ($result.Length -gt 10240) { $result = $result.Substring(0, 10240) + '...(truncated)' }
          $log = @{
            issue     = [int]$issueNum
            agent     = "${{ steps.parse.outputs.agent }}"
            command   = "${{ steps.parse.outputs.command }}"
            model     = "${{ steps.run_claude.outputs.model }}"
            exit_code = "${{ steps.run_claude.outputs.exit_code }}"
            timestamp = (Get-Date -Format o)
            result    = $result
          } | ConvertTo-Json -Depth 3
          $log | Out-File -FilePath $logFile -Encoding utf8

      - name: Post failure detail
        if: steps.run_claude.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let result = '';
            try { result = fs.readFileSync(process.env.RUNNER_TEMP + '/result.txt', 'utf8'); } catch(e) {}
            const last20 = result.split('\n').slice(-20).join('\n');
            const date = new Date().toISOString().slice(0,10);
            const issue = context.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue,
              body: `❌ **Agent run failed.** Last 20 lines:\n\`\`\`\n${last20}\n\`\`\`\nRun log: \`~/agent-memory/nexus/run-log/${date}-issue-${issue}.json\``
            });

      - name: Remove dispatch label (reset for next use)
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: '${{ github.event.label.name }}'
              });
            } catch (e) {
              // Label already removed — ignore
            }

  ambient-sam-review:
    runs-on: self-hosted
    # Quick Haiku-tier security scan on every PR marked ready for review.
    # Full Sonnet audit by Sam is still required before any merge to main.
    # Trigger on ready_for_review only (not opened) to avoid draft noise.
    if: github.event_name == 'pull_request' && github.event.action == 'ready_for_review'
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Generate diff summary
        id: diff
        shell: pwsh
        run: |
          $base = "${{ github.event.pull_request.base.sha }}"
          $head = "${{ github.event.pull_request.head.sha }}"
          $diff = git diff $base $head --stat 2>&1
          $diffFull = git diff $base $head -- '*.js' '*.ts' '*.py' '*.yml' '*.yaml' '*.json' 2>&1
          # Truncate to avoid token limits — Haiku context window is sufficient for 8k chars
          if ($diffFull.Length -gt 8000) { $diffFull = $diffFull.Substring(0, 8000) + "`n...(truncated)" }
          $diffFull | Out-File -FilePath "$env:RUNNER_TEMP\pr-diff.txt" -Encoding utf8
          "stat=$diff" >> $env:GITHUB_OUTPUT

      - name: Sam ambient scan (Haiku)
        id: sam_scan
        shell: pwsh
        run: |
          $prUrl = "${{ github.event.pull_request.html_url }}"
          $prTitle = "${{ github.event.pull_request.title }}"
          $diff = Get-Content "$env:RUNNER_TEMP\pr-diff.txt" -Raw
          $prompt = @"
          You are Sam (CSO). Perform a quick security scan of this PR diff.
          Focus only on: (1) secrets or credentials in code, (2) auth bypasses or missing auth checks, (3) unsafe user input handling or injection risks.
          Be concise. If clean, respond with exactly: "Sam: clean scan"
          If issues found, list them briefly with file:line if visible.
          PR: $prUrl
          Title: $prTitle

          Diff:
          $diff
          "@
          $prompt | Out-File -FilePath "$env:RUNNER_TEMP\sam-prompt.txt" -Encoding utf8
          $result = claude -p (Get-Content "$env:RUNNER_TEMP\sam-prompt.txt" -Raw) --model claude-haiku-4-5-20251001 2>&1
          $result | Out-File -FilePath "$env:RUNNER_TEMP\sam-result.txt" -Encoding utf8
          "exit_code=$LASTEXITCODE" >> $env:GITHUB_OUTPUT
        continue-on-error: true

      - name: Post scan result as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let result = '';
            try { result = fs.readFileSync(process.env.RUNNER_TEMP + '/sam-result.txt', 'utf8').trim(); }
            catch (e) { result = `Error reading scan result: ${e.message}`; }
            const isClean = result.toLowerCase().includes('clean scan');
            const icon = isClean ? 'Sam: clean scan' : 'Sam: issues found';
            const body = isClean
              ? `Sam (ambient scan): clean scan — no secrets, auth bypasses, or injection risks detected. Full audit still required before merge to main.`
              : `**Sam (ambient scan) — issues detected:**\n\n${result}\n\n> Full Sam audit required before merge to main.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

  auto-merge:
    runs-on: self-hosted
    if: |
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved' &&
      github.event.review.user.login == github.repository_owner &&
      contains(github.event.pull_request.labels.*.name, 'auto-merge-ok')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Check path safety
        id: path_check
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $files = gh pr view ${{ github.event.pull_request.number }} --json files --jq '.files[].path' 2>&1
          $unsafe = $files | Where-Object {
            $_ -notmatch '^docs/' -and
            $_ -notmatch '\.md$' -and
            $_ -notmatch '^tests/' -and
            $_ -notmatch '\.test\.js$'
          }
          if ($unsafe) {
            Write-Host 'UNSAFE files detected -- skipping auto-merge:'
            $unsafe | ForEach-Object { Write-Host "  $_" }
            'safe=false' >> $env:GITHUB_OUTPUT
          } else {
            Write-Host 'All files in safe paths -- proceeding with auto-merge'
            'safe=true' >> $env:GITHUB_OUTPUT
          }

      - name: Auto-merge
        if: steps.path_check.outputs.safe == 'true'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --squash --delete-branch
          gh pr comment ${{ github.event.pull_request.number }} --body 'Auto-merged: docs/test-only PR, Sam approved, all checks passed.'
