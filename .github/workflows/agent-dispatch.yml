name: Agent Dispatch

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [ready_for_review]

# Only one agent dispatch per issue/PR at a time
concurrency:
  group: agent-dispatch-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  dispatch:
    # Linux self-hosted runner co-located with Mission Control (see
    # tools/mission-control/install-runner.sh). BOTH labels required so only the
    # Linux runner picks this up.
    runs-on: [self-hosted, Linux]
    # Trigger on:
    #   agent:* label on issue
    #   /agent <name> comment (issue or PR) from repo owner
    #   /merge comment on PR from repo owner → Friday merges
    #   /close comment on PR from repo owner → Friday closes
    if: |
      (github.event_name == 'issues' &&
       startsWith(github.event.label.name, 'agent:')) ||
      (github.event_name == 'issue_comment' &&
       github.event.comment.user.login == github.repository_owner &&
       (startsWith(github.event.comment.body, '/agent ') ||
        github.event.comment.body == '/merge' ||
        github.event.comment.body == '/close'))

    steps:
      - name: Parse command + task
        id: parse
        shell: bash
        # SECURITY: untrusted user text (comment body, issue body, label name) is
        # passed via env and referenced as "$VAR" — NEVER interpolated into the script
        # body, so a comment containing $(...), backticks, or quotes cannot inject.
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          LABEL_NAME: ${{ github.event.label.name }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -o pipefail
          TASK_FILE="$RUNNER_TEMP/task.txt"
          body="$(printf '%s' "$COMMENT_BODY" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"

          if [ "$EVENT_NAME" = "issues" ]; then
            # Label dispatch: agent:<name> → <name>
            agent="${LABEL_NAME#agent:}"
            echo "agent=$agent" >> "$GITHUB_OUTPUT"
            echo "command=agent" >> "$GITHUB_OUTPUT"
            printf '%s' "$ISSUE_BODY" > "$TASK_FILE"

          elif [ "$body" = "/merge" ]; then
            echo "agent=friday" >> "$GITHUB_OUTPUT"
            echo "command=merge" >> "$GITHUB_OUTPUT"
            printf 'Be Friday (CTO). Merge PR #%s with squash and delete branch. Run: gh pr merge %s --squash --delete-branch' "$PR_NUMBER" "$PR_NUMBER" > "$TASK_FILE"

          elif [ "$body" = "/close" ]; then
            echo "agent=friday" >> "$GITHUB_OUTPUT"
            echo "command=close" >> "$GITHUB_OUTPUT"
            printf 'Be Friday (CTO). Close PR #%s without merging. Run: gh pr close %s' "$PR_NUMBER" "$PR_NUMBER" > "$TASK_FILE"

          else
            # /agent <name> <task...>
            agent="$(printf '%s' "$body" | awk '{print $2}')"
            rest="$(printf '%s' "$body" | cut -s -d' ' -f3-)"
            echo "agent=$agent" >> "$GITHUB_OUTPUT"
            echo "command=agent" >> "$GITHUB_OUTPUT"
            if [ -n "$rest" ]; then
              printf '%s' "$rest" > "$TASK_FILE"
            else
              printf '%s' "$ISSUE_BODY" > "$TASK_FILE"
            fi
          fi

          [ -f "$TASK_FILE" ] || printf '%s' "$ISSUE_BODY" > "$TASK_FILE"

      - name: Post "running" acknowledgement
        uses: actions/github-script@v7
        with:
          script: |
            const cmd = '${{ steps.parse.outputs.command }}';
            const agent = '${{ steps.parse.outputs.agent }}';
            const msg = cmd === 'merge'
              ? `🔀 **Merging PR...** (Friday dispatched ${new Date().toISOString()})`
              : cmd === 'close'
              ? `🚫 **Closing PR...** (Friday dispatched ${new Date().toISOString()})`
              : `⚙️ **Agent \`${agent}\` is running...** (started ${new Date().toISOString()})`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: msg
            });

      - name: Resolve gh/claude/node absolute paths for runner service context
        id: tools
        shell: bash
        # The self-hosted runner runs as a systemd service whose PATH may not include
        # ~/.local/bin. Resolve absolute paths once and invoke by full path.
        run: |
          resolve() {
            local name="$1"; shift
            local c
            for c in "$@"; do [ -x "$c" ] && { echo "$c"; return; }; done
            command -v "$name" 2>/dev/null || true
          }
          echo "gh_path=$(resolve gh "$HOME/.local/bin/gh" /usr/local/bin/gh /usr/bin/gh)" >> "$GITHUB_OUTPUT"
          echo "claude_path=$(resolve claude "$HOME/.local/bin/claude" /usr/local/bin/claude /usr/bin/claude)" >> "$GITHUB_OUTPUT"
          echo "node_path=$(resolve node "$HOME/.local/bin/node" /usr/local/bin/node /usr/bin/node)" >> "$GITHUB_OUTPUT"

      - name: Gate /merge on pr-guard (hard security gate — #112)
        id: guard
        if: steps.parse.outputs.command == 'merge'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          NODE="${{ steps.tools.outputs.node_path }}"
          set +e
          "$NODE" tools/pr-guard.js "$PR_NUMBER"
          guard_exit=$?
          set -e
          echo "guard_exit=$guard_exit" >> "$GITHUB_OUTPUT"
          if [ "$guard_exit" -ne 0 ]; then
            echo "pr-guard blocked merge of PR #$PR_NUMBER (exit $guard_exit)"
          fi
        continue-on-error: true

      - name: Post blocked-merge comment (pr-guard failed)
        if: steps.parse.outputs.command == 'merge' && steps.guard.outputs.guard_exit != '0'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🚫 **Merge blocked.** `pr-guard.js` reports this PR is not ready — CI must be green, no blocking review threads, and an explicit Sam (CSO) APPROVED security-audit review is required before merge. This is a hard, non-bypassable gate (see issue #112). Re-run `/merge` once Sam approves and CI is green.'
            });

      - name: Run agent (claude)
        id: run_claude
        shell: bash
        if: steps.parse.outputs.agent != '' && (steps.parse.outputs.command != 'merge' || steps.guard.outputs.guard_exit == '0')
        run: |
          set -o pipefail
          CLAUDE="${{ steps.tools.outputs.claude_path }}"
          TASK_FILE="$RUNNER_TEMP/task.txt"
          task="$(cat "$TASK_FILE")"

          # Classify task complexity → select model
          taskLen=${#task}
          model="claude-sonnet-5"
          if [ "$taskLen" -gt 500 ] || printf '%s' "$task" | grep -qiE 'architecture|security|design|cross-cutting|migration|refactor|multi-file|system|infrastructure'; then
            model="claude-opus-4-8"
          elif [ "$taskLen" -lt 200 ] && ! printf '%s' "$task" | grep -qiE 'file|function|class|module|import'; then
            model="claude-haiku-4-5-20251001"
          fi
          echo "model=$model" >> "$GITHUB_OUTPUT"

          # Prompt piped via stdin (see sam-audit.yml) — avoids argv length/quoting limits.
          set +e
          "$CLAUDE" -p --model "$model" < "$TASK_FILE" > "$RUNNER_TEMP/result.txt" 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e
        continue-on-error: true

      - name: Parse agent output protocol (DONE:/BLOCKED:/NEEDS_INPUT:)
        id: protocol
        if: steps.run_claude.outputs.exit_code != ''
        shell: bash
        run: |
          # Every agent's first output line is required to be DONE:/BLOCKED:/NEEDS_INPUT:
          # (see .agents/agents/*.md "Output Protocol"). This makes the protocol load-bearing:
          # it drives an issue label so the prefix is visible/actionable outside the raw log (#115).
          firstLine="$(grep -m1 -v '^[[:space:]]*$' "$RUNNER_TEMP/result.txt" 2>/dev/null || true)"
          prefix='unknown'
          trimmed="$(printf '%s' "$firstLine" | sed 's/^[[:space:]]*//')"
          case "$trimmed" in
            DONE:*)        prefix='done' ;;
            BLOCKED:*)     prefix='blocked' ;;
            NEEDS_INPUT:*) prefix='needs-input' ;;
          esac
          echo "prefix=$prefix" >> "$GITHUB_OUTPUT"
          echo "first_line=$firstLine" >> "$GITHUB_OUTPUT"

      - name: Apply agent status label
        if: steps.protocol.outputs.prefix != '' && steps.protocol.outputs.prefix != 'unknown'
        uses: actions/github-script@v7
        with:
          script: |
            const prefix = '${{ steps.protocol.outputs.prefix }}';
            const label = `agent:${prefix}`;
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [label]
              });
            } catch (e) {
              // Label may not exist yet in repo label set — ignore, comment still carries the status.
            }

      - name: Post result
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const agent = '${{ steps.parse.outputs.agent }}';
            const cmd = '${{ steps.parse.outputs.command }}';
            let result = '';
            try {
              result = fs.readFileSync(process.env.RUNNER_TEMP + '/result.txt', 'utf8');
            } catch (e) {
              result = `Error reading result: ${e.message}`;
            }
            if (result.length > 60000) {
              result = result.slice(0, 60000) + '\n\n... (truncated)';
            }
            const exitCode = '${{ steps.run_claude.outputs.exit_code }}';
            const protoPrefix = '${{ steps.protocol.outputs.prefix }}';
            const status = exitCode === '0' ? '✅' : '⚠️';
            const label = cmd === 'merge' ? 'Merge' : cmd === 'close' ? 'Close' : `Agent \`${agent}\``;
            const protoHeader = protoPrefix && protoPrefix !== 'unknown' ? ` [\`${protoPrefix}\`]` : '';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${status} **${label} result:**${protoHeader}\n\n\`\`\`\n${result}\n\`\`\``
            });

      - name: Write run log
        if: always()
        shell: bash
        env:
          ISSUE_NUM: ${{ github.event.issue.number }}
          AGENT: ${{ steps.parse.outputs.agent }}
          COMMAND: ${{ steps.parse.outputs.command }}
          MODEL: ${{ steps.run_claude.outputs.model }}
          EXIT_CODE: ${{ steps.run_claude.outputs.exit_code }}
        run: |
          NODE="${{ steps.tools.outputs.node_path }}"
          logDir="$HOME/agent-memory/nexus/run-log"
          mkdir -p "$logDir"
          date="$(date +%Y-%m-%d)"
          logFile="$logDir/$date-issue-$ISSUE_NUM.json"
          # Build JSON with node so arbitrary result text is escaped safely (no manual quoting).
          RESULT_FILE="$RUNNER_TEMP/result.txt" LOG_FILE="$logFile" "$NODE" -e '
            const fs = require("fs");
            let result = "";
            try { result = fs.readFileSync(process.env.RESULT_FILE, "utf8"); } catch {}
            if (result.length > 10240) result = result.slice(0, 10240) + "...(truncated)";
            const log = {
              issue: parseInt(process.env.ISSUE_NUM, 10),
              agent: process.env.AGENT || "",
              command: process.env.COMMAND || "",
              model: process.env.MODEL || "",
              exit_code: process.env.EXIT_CODE || "",
              timestamp: new Date().toISOString(),
              result,
            };
            fs.writeFileSync(process.env.LOG_FILE, JSON.stringify(log, null, 2));
          '

      - name: Verify DONE claim (done-check)
        if: always()
        shell: bash
        continue-on-error: true
        env:
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          # Mechanically verify a DONE claim (PR merged, commit landed, files exist)
          # and annotate the run log; compute-trust-scores.js counts a contradicted
          # DONE as a failure instead of a success.
          NODE="${{ steps.tools.outputs.node_path }}"
          logDir="$HOME/agent-memory/nexus/run-log"
          date="$(date +%Y-%m-%d)"
          logFile="$logDir/$date-issue-$ISSUE_NUM.json"
          [ -f "$logFile" ] && "$NODE" tools/done-check.js "$logFile" || true

      - name: Post failure detail
        if: steps.run_claude.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let result = '';
            try { result = fs.readFileSync(process.env.RUNNER_TEMP + '/result.txt', 'utf8'); } catch(e) {}
            const last20 = result.split('\n').slice(-20).join('\n');
            const date = new Date().toISOString().slice(0,10);
            const issue = context.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue,
              body: `❌ **Agent run failed.** Last 20 lines:\n\`\`\`\n${last20}\n\`\`\`\nRun log: \`~/agent-memory/nexus/run-log/${date}-issue-${issue}.json\``
            });

      - name: Remove dispatch label (reset for next use)
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: '${{ github.event.label.name }}'
              });
            } catch (e) {
              // Label already removed — ignore
            }

  ambient-sam-review:
    runs-on: [self-hosted, Linux]
    # Quick Haiku-tier security scan on every PR marked ready for review.
    # Full Sonnet audit by Sam is still required before any merge to main.
    # Trigger on ready_for_review only (not opened) to avoid draft noise.
    if: github.event_name == 'pull_request' && github.event.action == 'ready_for_review'
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Resolve claude absolute path for runner service context
        id: tools
        shell: bash
        run: |
          resolve() {
            local name="$1"; shift
            local c
            for c in "$@"; do [ -x "$c" ] && { echo "$c"; return; }; done
            command -v "$name" 2>/dev/null || true
          }
          echo "claude_path=$(resolve claude "$HOME/.local/bin/claude" /usr/local/bin/claude /usr/bin/claude)" >> "$GITHUB_OUTPUT"

      - name: Generate diff summary
        id: diff
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff "$BASE_SHA" "$HEAD_SHA" --stat > "$RUNNER_TEMP/diff-stat.txt" 2>&1 || true
          git diff "$BASE_SHA" "$HEAD_SHA" -- '*.js' '*.ts' '*.py' '*.yml' '*.yaml' '*.json' > "$RUNNER_TEMP/pr-diff-full.txt" 2>&1 || true
          # Truncate to ~8000 chars — Haiku context is sufficient and keeps tokens down.
          head -c 8000 "$RUNNER_TEMP/pr-diff-full.txt" > "$RUNNER_TEMP/pr-diff.txt"
          if [ "$(wc -c < "$RUNNER_TEMP/pr-diff-full.txt")" -gt 8000 ]; then
            printf '\n...(truncated)\n' >> "$RUNNER_TEMP/pr-diff.txt"
          fi

      - name: Sam ambient scan (Haiku)
        id: sam_scan
        shell: bash
        # Untrusted PR url/title via env, not interpolated.
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -o pipefail
          CLAUDE="${{ steps.tools.outputs.claude_path }}"
          {
            echo 'You are Sam (CSO). Perform a quick security scan of this PR diff.'
            echo 'Focus only on: (1) secrets or credentials in code, (2) auth bypasses or missing auth checks, (3) unsafe user input handling or injection risks.'
            echo 'Be concise. If clean, respond with exactly: "Sam: clean scan"'
            echo 'If issues found, list them briefly with file:line if visible.'
            printf 'PR: %s\n' "$PR_URL"
            printf 'Title: %s\n' "$PR_TITLE"
            echo ''
            echo 'Diff:'
            cat "$RUNNER_TEMP/pr-diff.txt"
          } > "$RUNNER_TEMP/sam-prompt.txt"
          set +e
          "$CLAUDE" -p --model claude-haiku-4-5-20251001 < "$RUNNER_TEMP/sam-prompt.txt" > "$RUNNER_TEMP/sam-result.txt" 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e
        continue-on-error: true

      - name: Post scan result as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let result = '';
            try { result = fs.readFileSync(process.env.RUNNER_TEMP + '/sam-result.txt', 'utf8').trim(); }
            catch (e) { result = `Error reading scan result: ${e.message}`; }
            const isClean = result.toLowerCase().includes('clean scan');
            const body = isClean
              ? `Sam (ambient scan): clean scan — no secrets, auth bypasses, or injection risks detected. Full audit still required before merge to main.`
              : `**Sam (ambient scan) — issues detected:**\n\n${result}\n\n> Full Sam audit required before merge to main.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

  auto-merge:
    runs-on: [self-hosted, Linux]
    if: |
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved' &&
      github.event.review.user.login == github.repository_owner &&
      contains(github.event.pull_request.labels.*.name, 'auto-merge-ok')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Check path safety
        id: path_check
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -o pipefail
          files="$(gh pr view "$PR_NUMBER" --json files --jq '.files[].path')"
          unsafe="$(printf '%s\n' "$files" | grep -vE '^docs/|\.md$|^tests/|\.test\.js$' || true)"
          if [ -n "$unsafe" ]; then
            echo 'UNSAFE files detected -- skipping auto-merge:'
            printf '  %s\n' $unsafe
            echo 'safe=false' >> "$GITHUB_OUTPUT"
          else
            echo 'All files in safe paths -- proceeding with auto-merge'
            echo 'safe=true' >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-merge
        if: steps.path_check.outputs.safe == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" --squash --delete-branch
          gh pr comment "$PR_NUMBER" --body 'Auto-merged: docs/test-only PR, Sam approved, all checks passed.'
