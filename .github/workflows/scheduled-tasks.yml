name: Scheduled Tasks

on:
  schedule:
    # daily-standup: 9am weekdays UTC
    - cron: '0 9 * * 1-5'
    # weekly-brain-consolidation: Monday 8am UTC
    - cron: '0 8 * * 1'
    # weekly-memory-decay + weekly-trust-scores: Sunday midnight UTC
    - cron: '0 0 * * 0'
  pull_request:
    types: [opened]
    branches: [dev]

jobs:
  daily-standup:
    if: github.event_name == 'schedule' && github.event.schedule == '0 9 * * 1-5'
    runs-on: self-hosted
    steps:
      - name: Daily standup
        shell: pwsh
        run: |
          node C:\Users\natha\AgentSystem\tools\agent-message.js --from=Jarvis --to=Jarvis --subject='daily-standup' --action='review priority:high issues and post briefing'

  weekly-brain-consolidation:
    if: github.event_name == 'schedule' && github.event.schedule == '0 8 * * 1'
    runs-on: self-hosted
    steps:
      - name: Run full memory sleep cycle
        shell: pwsh
        run: |
          node C:\Users\natha\AgentSystem\tools\memory-maintenance.js --reflect

  weekly-memory-decay:
    if: github.event_name == 'schedule' && github.event.schedule == '0 0 * * 0'
    runs-on: self-hosted
    steps:
      - name: Memory decay
        shell: pwsh
        run: |
          node C:\Users\natha\AgentSystem\tools\memory-decay.js --brain=agentsystem
          node C:\Users\natha\AgentSystem\tools\memory-decay.js --brain=personal-brain

  weekly-trust-scores:
    if: github.event_name == 'schedule' && github.event.schedule == '0 0 * * 0'
    runs-on: self-hosted
    steps:
      - name: Compute trust scores
        shell: pwsh
        run: node C:\Users\natha\AgentSystem\tools\compute-trust-scores.js

  pr-auto-review:
    if: github.event_name == 'pull_request'
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cavecrew review
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $prNumber = '${{ github.event.pull_request.number }}'
          $repo = '${{ github.repository }}'
          $result = claude -p "You are cavecrew-reviewer. Review the diff for PR #$prNumber in repo $repo and post findings as a PR comment. Be concise -- list any correctness bugs, missing tests, or standards violations." --model claude-sonnet-5 2>&1
          gh pr comment $prNumber --body "$result"
