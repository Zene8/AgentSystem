# #154: every job below reads or writes local-machine state that only exists on the
# self-hosted runner's host (~/agent-memory/nexus/*, ~/.claude, or the local `claude` CLI for
# pr-auto-review) — none of it is portable to a GitHub-hosted runner, so none of these jobs can
# be migrated to ubuntu-latest. When the self-hosted runner is offline these jobs simply never
# start (no failure signal on their own); `.github/workflows/runner-health-check.yml` runs on
# ubuntu-latest specifically to detect that condition from outside and open/update a
# `runner:down` tracking issue, which is the loud-failure signal for this whole file.
name: Scheduled Tasks

on:
  schedule:
    # weekly-brain-consolidation: Monday 8am UTC
    - cron: '0 8 * * 1'
    # weekly-memory-decay + weekly-trust-scores + weekly-hygiene: Sunday midnight UTC
    - cron: '0 0 * * 0'
  pull_request:
    types: [opened]
    branches: [dev]

jobs:
  # memory-maintenance.js operates on the local ~/agent-memory brain — local machine state.
  weekly-brain-consolidation:
    if: github.event_name == 'schedule' && github.event.schedule == '0 8 * * 1'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Run full memory sleep cycle
        shell: pwsh
        run: |
          node ${{ github.workspace }}\tools\memory-maintenance.js --reflect

  # memory-decay.js reads/writes ~/agent-memory/nexus/* brains directly — local machine state.
  weekly-memory-decay:
    if: github.event_name == 'schedule' && github.event.schedule == '0 0 * * 0'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Memory decay
        shell: pwsh
        run: |
          node ${{ github.workspace }}\tools\memory-decay.js --brain=agentsystem
          node ${{ github.workspace }}\tools\memory-decay.js --brain=personal-brain

  # compute-trust-scores.js reads ~/agent-memory/nexus/run-log/* — local machine state.
  weekly-trust-scores:
    if: github.event_name == 'schedule' && github.event.schedule == '0 0 * * 0'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Compute trust scores
        shell: pwsh
        run: node ${{ github.workspace }}\tools\compute-trust-scores.js

  # Operates on ~/.claude and ~/agent-memory directly (rotate-logs, claude-json-hygiene,
  # caveman-cache-fix, deploy-hooks --check) — none of these paths exist on a hosted runner.
  weekly-hygiene:
    if: github.event_name == 'schedule' && github.event.schedule == '0 0 * * 0'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Rotate jsonl logs (session-log etc.)
        shell: pwsh
        run: node ${{ github.workspace }}\tools\rotate-logs.js --threshold-mb=5 --keep=3
      - name: Prune ~/.claude tmp orphans + backup churn
        shell: pwsh
        run: node ${{ github.workspace }}\tools\claude-json-hygiene.js --keep=5 --tmp-age-hours=24
      - name: Dedupe caveman plugin cache
        shell: pwsh
        run: node ${{ github.workspace }}\tools\caveman-cache-fix.js
      - name: Report hook drift (repo vs ~/.claude)
        shell: pwsh
        run: node ${{ github.workspace }}\tools\deploy-hooks.js --check
        continue-on-error: true

  # Requires the local `claude` CLI (not installable/licensed for use on hosted runners here).
  pr-auto-review:
    if: github.event_name == 'pull_request'
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cavecrew review
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $prNumber = '${{ github.event.pull_request.number }}'
          $repo = '${{ github.repository }}'
          $result = claude -p "You are cavecrew-reviewer. Review the diff for PR #$prNumber in repo $repo and post findings as a PR comment. Be concise -- list any correctness bugs, missing tests, or standards violations." --model claude-sonnet-5 2>&1
          gh pr comment $prNumber --body "$result"
