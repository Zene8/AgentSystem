name: PR Comment Tracker

on:
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  comment-received:
    if: (github.event_name == 'pull_request_review_comment' || github.event_name == 'pull_request_review') && github.event.review.state != 'approved'
    name: Mark comments as pending
    runs-on: ubuntu-latest
    steps:
      - name: Add comments:pending label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label comments:pending || true

      - name: Post checklist comment (if not already posted)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Check if we already posted a checklist comment in the last 10 comments
          recent_comments=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json comments --jq '.comments[-10:] | map(.body)' 2>/dev/null || echo "[]")

          if echo "$recent_comments" | grep -q "<!-- pr-comment-tracker -->"; then
            echo "Checklist comment already posted"
            exit 0
          fi

          # Post the checklist comment
          comment_body=$(cat <<'EOF'
          <!-- pr-comment-tracker -->

          ✍️ **New review feedback received.** Please resolve each comment:
          1. Reply to the comment explaining your approach or asking for clarification
          2. Make any necessary code changes
          3. Re-request review when all comments are resolved (GitHub marks threads as "resolved" automatically)

          Once all review threads are resolved, the `comments:pending` label will be automatically removed.
          EOF
          )

          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$comment_body"

  comments-resolved:
    if: github.event_name == 'pull_request' && github.event.action == 'synchronize'
    name: Check if all comments resolved
    runs-on: ubuntu-latest
    steps:
      - name: Check review threads
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Query GraphQL for review threads
          resolved_count=$(gh api graphql -f owner="${REPO%/*}" -f repo="${REPO#*/}" -F pr_number="$PR_NUMBER" -f query='
            query($owner: String!, $repo: String!, $pr_number: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $pr_number) {
                  reviewThreads(first: 50) {
                    nodes {
                      isResolved
                    }
                  }
                }
              }
            }
          ' --jq '.data.repository.pullRequest.reviewThreads.nodes | length' 2>/dev/null || echo "0")

          unresolved_count=$(gh api graphql -f owner="${REPO%/*}" -f repo="${REPO#*/}" -F pr_number="$PR_NUMBER" -f query='
            query($owner: String!, $repo: String!, $pr_number: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $pr_number) {
                  reviewThreads(first: 50) {
                    nodes {
                      isResolved
                    }
                  }
                }
              }
            }
          ' --jq '[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false)] | length' 2>/dev/null || echo "0")

          echo "Total review threads: $resolved_count"
          echo "Unresolved threads: $unresolved_count"

          if [ "$unresolved_count" -eq 0 ] && [ "$resolved_count" -gt 0 ]; then
            echo "all_resolved=true" >> $GITHUB_OUTPUT
          else
            echo "all_resolved=false" >> $GITHUB_OUTPUT
          fi

      - name: Remove label if all resolved
        if: steps.check.outputs.all_resolved == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label comments:pending || true
