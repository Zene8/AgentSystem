name: Agent Memory Consistency Tests

on:
  push:
    branches: [main]
    paths:
      - '.agents/**'
      - 'sync_agents_from_repo.ps1'
      - 'tests/test_memory_consistency.sh'
  pull_request:
    branches: [main]
    paths:
      - '.agents/**'
      - 'sync_agents_from_repo.ps1'
      - 'tests/test_memory_consistency.sh'
  workflow_dispatch: {}

jobs:
  memory-consistency:
    name: Memory Consistency Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make test script executable
        run: chmod +x tests/test_memory_consistency.sh

      - name: Run memory consistency tests (CI mode — skip local CLI sync)
        env:
          SKIP_CLI_SYNC: 'true'
        run: bash tests/test_memory_consistency.sh

      - name: Validate file timestamps are recent
        run: |
          echo "=== Checking .agents/memory file timestamps ==="
          STALE=0

          # In CI, check that files were committed recently enough (within 90 days)
          # This catches truly abandoned memory files
          for FILE in .agents/memory/jarvis.md .agents/memory/friday.md .agents/memory/sam.md .agents/memory/nat.md; do
            if [ ! -f "$FILE" ]; then
              echo "FAIL: $FILE not found"
              STALE=$((STALE + 1))
              continue
            fi

            # Get last git commit date for this file
            LAST_COMMIT=$(git log -1 --format="%ci" -- "$FILE" 2>/dev/null | head -1)
            if [ -z "$LAST_COMMIT" ]; then
              echo "WARN: $FILE has no git history"
            else
              echo "OK: $FILE — last commit: $LAST_COMMIT"
            fi
          done

          if [ "$STALE" -gt 0 ]; then
            echo "ERROR: $STALE memory file(s) missing"
            exit 1
          fi
