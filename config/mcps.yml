# MCP servers available to all agents.
# To add a new MCP: add entry here AND ensure plugin is installed/connected.
servers:
  # Communication & productivity
  - name: gmail
  - name: google-calendar
  - name: google-drive
  - name: notion
  - name: microsoft-365      # reconnected — Outlook, Teams, OneDrive

  # Design
  - name: canva
  - name: figma

  # Dev tools
  - name: github             # via claude.ai GitHub integration
  - name: playwright         # browser automation
  - name: context7           # live library/framework docs
  - name: neon               # Neon Postgres MCP
  - name: vercel             # Vercel deployments MCP
  - name: sentry             # error tracking

  # Cloud
  - name: azure              # full Azure resource management
  - name: deploy-on-aws      # AWS knowledge + pricing

  # Uncomment and configure when connected:
  # - name: linear
  # - name: slack
  # - name: firebase

# Per-agent lazy loading declarations
# Agents ONLY invoke tools from their declared list even if other MCPs are available.
# This prevents context bloat and unintended cross-domain tool calls.
agent_mcps:
  jarvis:   [github, gmail, google-calendar, google-drive]
  friday:   [github, context7, playwright]
  sam:      [github]
  nat:      [github, gmail, google-drive]
  ultron:   [github, context7, vercel]
  pym:      [github, neon]
  leo:      [github, vercel]
  astra:    [github, playwright, figma, context7]
  wanda:    [figma, canva]
  threepio: [github, google-drive, notion]
  r2d2:     [github]
