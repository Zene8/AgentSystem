# MCP servers available to all agents.
# "Connected" below means: actually authenticated/wired in this environment (verified against
# the live tool list — servers that only expose authenticate/complete_authentication stubs are
# NOT connected and belong in the "Planned / not connected" block, not here). See #119.
# To add a new MCP: add entry here AND verify it's actually connected (not just installed/listed)
# before referencing it in any agent's frontmatter `mcps:` scoping.
servers:
  # Communication & productivity
  - name: gmail
  - name: google-calendar
  - name: google-drive
  - name: notion

  # Design
  - name: figma

  # Dev tools
  - name: github             # via claude.ai GitHub integration / gh CLI
  - name: playwright         # browser automation
  - name: context7           # live library/framework docs

  # Planned / not connected — do NOT reference these in agent `mcps:` frontmatter or routing
  # instructions until they are actually authenticated (currently only expose
  # authenticate/complete_authentication stubs, or are entirely absent from the live tool list).
  # Sentry and Stripe are accessed via tools/integrations/*.js, NOT as MCP servers, despite
  # having auth stubs available — do not treat those stubs as "connected" either.
  # - name: canva
  # - name: microsoft-365
  # - name: vercel
  # - name: neon
  # - name: azure
  # - name: deploy-on-aws
  # - name: sentry
  # - name: linear
  # - name: slack
  # - name: firebase

# Per-agent lazy loading declarations
# Agents ONLY invoke tools from their declared list even if other MCPs are available.
# This prevents context bloat and unintended cross-domain tool calls.
# NOTE: this `agent_mcps` (and the `mcps:` field in individual .agents/agents/*.md frontmatter)
# is ADVISORY ONLY — not a recognized/enforced Claude Code field. The harness does not mechanically
# block an agent from calling a non-declared MCP tool; this is a convention agents are instructed
# to self-enforce, backed only by each agent's own read of this file / its frontmatter. Real
# enforcement (if ever needed) would have to come from tool allowlists at the harness/settings
# level, not from this YAML.
agent_mcps:
  jarvis:   [github, gmail, google-calendar, google-drive]
  friday:   [github, context7, playwright]
  sam:      [github]
  nat:      [github, gmail, google-drive]
  ultron:   [github, context7]
  pym:      [github]
  leo:      [github]
  astra:    [github, playwright, figma, context7]
  wanda:    [figma]
  threepio: [github, google-drive, notion]
  r2d2:     [github]
