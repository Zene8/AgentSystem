# routines.yml — Agent routines registry.
# Each routine is enforced by default (enforce: hard) unless bypassed at runtime.
#
# IMPORTANT — what "enforce: hard" actually means (#119): for `mechanism: agent-rule` routines,
# "hard" means the action text is ALWAYS injected as context at SessionStart via
# .agents/rules/routines.generated.md — it is NOT mechanically blocked or validated by the
# harness. The agent is instructed to follow it, but nothing prevents the agent from ignoring
# it short of its own compliance. Only `mechanism: hook` routines that are wired through an
# actual blocking hook (e.g. guard-git.sh) can mechanically prevent an action. Read "hard" as
# "always-injected / expected-to-follow", not "impossible to bypass without the CLI bypass
# command" — the bypass command just stops the text from being injected in the first place.
#
# To bypass a routine without editing this file:
#   node tools/routines.js bypass <id> [--session]
#   node tools/routines.js unbypass <id>
#
# Mechanisms:
#   agent-rule — compiled into .agents/rules/routines.generated.md (injected at SessionStart)
#   hook       — enforced by hooks/routine-dispatch.js at runtime (no settings.json edit needed)
#   cron       — registers a Windows Task Scheduler job
#
# To add a new routine: add an entry here, then run: node tools/routines.js compile

- id: always-worktree
  description: Feature work runs in an isolated git worktree
  trigger: feature_work
  mechanism: agent-rule
  enforce: hard
  enabled: true
  action: "Before starting any feature work, create or enter a git worktree. Use the superpowers:using-git-worktrees skill. Never do feature work directly on the main branch clone."

- id: fix-pr-until-green
  description: Do not declare done until PR CI checks pass and all review threads are resolved
  trigger: pr_open
  mechanism: agent-rule
  enforce: hard
  enabled: true
  action: "After opening a PR, do not declare DONE until pr-guard passes: run `node tools/pr-guard.js <pr-number>` — all CI checks must be green and all review threads resolved."

- id: auto-resolve-pr-comments
  description: 2-3 minutes after PR creation, respond to any review comments
  trigger: pr_create
  mechanism: hook
  enforce: hard
  enabled: true
  action: "When a PR is created (PostToolUse: gh pr create), schedule a one-shot job (~+2min) that responds to any open review comments on that PR."

- id: identity-query-inline
  description: Answer identity/lookup queries inline from graph-query, never spawn Jarvis
  trigger: identity_lookup
  mechanism: agent-rule
  enforce: hard
  enabled: true
  action: "For identity/memory queries (who am I, what do you know about me, my preferences), answer INLINE using: node ~/dev/AgentSystem/tools/graph/graph-query.js personal-brain <keywords> --brain-path=~/agent-memory/nexus/personal-brain --record-access. Do NOT spawn a heavyweight agent. This path returns ~110 tokens vs 47k for a subagent call."

- id: memory-write-back
  description: Agents self-capture durable facts to memory the moment they judge them relevant
  trigger: durable_fact_learned
  mechanism: agent-rule
  enforce: hard
  enabled: true
  action: "The MOMENT you learn a durable fact worth keeping (a user preference, decision, correction, stable project/company context, or a reusable pattern), immediately persist it — do not wait for session end. Run: node ~/dev/AgentSystem/tools/brain-remember.js --fact=\"<concise fact>\" [--tier=repo --target=<slug> | --tier=agent --target=<name>]. Tier routing: personal (default) = about the user; repo:<slug> = a technical/business fact about ONE repo (slugs+descriptions in ~/agent-memory/nexus/known-repos.json — match by what the repo IS, e.g. genie=product UI vs genie-brain=Arbor Genie backend/business-logic); agent:<name> = a learned pattern about one agent. Only capture facts that are durable + specific + high-precision; skip one-off task details and speculation. Dedup is automatic. A Stop-hook safety net (memory-capture.js) also sweeps the transcript, but capture at the moment of insight so nothing is lost."

- id: teach-the-swarm
  description: "[META] A prompt-match routine can teach new swarm behavior. Disabled example."
  trigger: prompt_match
  mechanism: agent-rule
  enforce: hard
  enabled: false
  match_pattern: "security audit .*PR"
  action: "When prompt matches 'security audit <PR>', spawn Sam (security agent) with: claude @sam --pr=<PR-number>. This demonstrates the prompt-match → swarm-spawn pattern. To add a new swarm behavior: add a routine with trigger=prompt_match and match_pattern=<your regex>, set mechanism=agent-rule, and describe the swarm spawn in action."

- id: post-merge-cleanup
  description: After a PR merges, close its linked issue and confirm the branch was deleted
  trigger: pr_merge
  mechanism: agent-rule
  enforce: hard
  enabled: true
  action: "After merging a PR (gh pr merge), verify the linked issue is closed (gh issue close <N> --comment referencing the PR) and the source branch was deleted (--delete-branch on merge, or gh api to delete if it wasn't). Do not leave merged branches or linked-but-open issues behind."

- id: verify-before-close
  description: Never close an issue without a landed commit/PR reference
  trigger: issue_close
  mechanism: agent-rule
  enforce: hard
  enabled: true
  action: "Before closing any GitHub issue, verify the fix actually landed: use `node ~/dev/AgentSystem/tools/issue-close.js <n> --commit <sha>` which checks the commit is reachable from origin/main (git merge-base --is-ancestor) before closing with a reference comment. Never `gh issue close` directly for fix-type issues; closed-without-landed-commit caused a full re-audit round (#151)."

# NOTE on cron-mechanism routines (2026-07-12 audit): `mechanism: cron` entries are NOT
# auto-registered by routines.js — they document Windows Task Scheduler jobs created by
# tools/setup-scheduled-tasks.ps1. Re-run that script after changing any cron entry here.

- id: weekly-agent-review
  description: Saturday agent fleet review (goal scorecard, risk scan, agent performance)
  trigger: schedule
  mechanism: cron
  schedule: "0 9 * * 6"
  task_name: AgentSystem-WeeklyAgentReview
  enforce: hard
  enabled: true
  action: "Weekly agent review (headless Jarvis via `claude --bg`): review routing-log.jsonl misroutes, session costs (node ~/dev/AgentSystem/tools/session-cost.js --week), open blockers, and goal scorecard. Log outcome via decision-log.js."

- id: weekly-brain-review
  description: Monday brain consolidation (full memory sleep cycle + reflection)
  trigger: schedule
  mechanism: cron
  schedule: "0 8 * * 1"
  task_name: AgentSystem-WeeklyBrainConsolidation
  enforce: hard
  enabled: true
  action: "Weekly brain review: run node ~/dev/AgentSystem/tools/memory-maintenance.js --reflect — full sleep cycle (split/reconsolidate/decay/stale-prune/consolidate/seed + reflection). Supersedes the old personal-brain-split.js + memory-stale.js two-step, which memory-maintenance.js now wraps."

- id: weekly-memory-decay
  description: Sunday visit_count decay across personal-brain and agentsystem graphs
  trigger: schedule
  mechanism: cron
  schedule: "0 0 * * 0"
  task_name: AgentSystem-WeeklyMemoryDecay
  enforce: hard
  enabled: true
  action: "Weekly memory decay: node ~/dev/AgentSystem/tools/memory-decay.js --brain=agentsystem then --brain=personal-brain. Keeps BM25 retrieval weights fresh by decaying stale visit counts."

- id: weekly-trust-scores
  description: Saturday trust-score aggregation from agent-dispatch run logs
  trigger: schedule
  mechanism: cron
  schedule: "0 8 * * 6"
  task_name: AgentSystem-WeeklyTrustScores
  enforce: hard
  enabled: true
  action: "Weekly trust scores: node ~/dev/AgentSystem/tools/compute-trust-scores.js — aggregates ~/agent-memory/nexus/run-log/*.json into trust-scores.md (read by leads before delegation)."
