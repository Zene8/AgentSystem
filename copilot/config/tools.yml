# CLI tools available to all agents.
# Add new tools here — agents read this via injected context.
cli:
  - claude     # Claude Code CLI — spawn subagents, run skills
  - gemini     # Gemini CLI
  - gh         # GitHub CLI — issues, PRs, releases
  - git
  - npm
  - npx
  - az         # Azure CLI
  - azd        # Azure Developer CLI
  - wrangler   # Cloudflare Pages/Workers
  - vercel     # Vercel CLI
  - terraform  # Terraform/OpenTofu IaC
  - tofu       # OpenTofu IaC

skills:
  # Execution shortcuts — agents can invoke these via the Skill tool
  - vercel:deploy          # deploy to Vercel (preview or prod)
  - vercel:env             # manage Vercel env vars
  - vercel:status          # check deployment status
  - azure:azure-deploy     # deploy to Azure
  - azure:azure-validate   # validate Azure config
  - azure:azure-cost       # Azure cost analysis
  - deploy-on-aws:deploy   # deploy to AWS
  - stripe:stripe-best-practices
  - sentry:sentry-workflow # Sentry issue triage
  - commit-commands:commit-push-pr
  - code-review:code-review
  - feature-dev:feature-dev
  - superpowers:brainstorming
  - superpowers:subagent-driven-development
  - superpowers:writing-plans

bash:
  enabled: true
  # Agents must PAUSE and request user approval before:
  escalate_before:
    - git push origin main
    - git push --force
    - prisma migrate deploy
    - terraform apply
    - tofu apply
    - az containerapp update
    - az staticwebapp
    - wrangler deploy
    - vercel --prod
